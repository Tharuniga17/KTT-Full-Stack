<!DOCTYPE html>
<html>
<head>
    <title>Floating Login Card</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      

        /* Card floating effect */
        .floating-card {
            animation: float 3s ease-in-out infinite;
            transition: transform 0.3s;
        }

        /* Optional: hover effect for extra lift */
        .floating-card:hover {
            transform: translateY(-25px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-warning d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card floating-card mt-5 shadow-lg p-4 bg-white text-center" style="height: 400px; width: 400px;">
        <h2 class="mb-3">Login</h2>
        <div class="mt-4">
            <div class="m-auto mt-3">
                <label>Email Address:</label><br>
                <input type="email" style="width: 250px;" class="p-2 mt-2" placeholder="Email">
            </div><br>
            <div>
                <label>Password:</label><br>
                <input type="password" class="p-2 mt-2" style="width:250px" placeholder="Password">
            </div>
            <div class="mt-2">
                <input type="checkbox" style="margin-right: 5px;">Show Password
            </div>
            <div class="mt-3">
                <button onclick="window.location.href='task1.html'" class="bg-primary p-2 text-white" style="width: 250px;">Sign in</button>
            </div>
        </div>
    </div>

</body>
</html>
