<!DOCTYPE html>
<html>
<head>
<title>Floating Card Animation</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    background-color:#f5f5f5;

    /* grid background */
    background-image:
    linear-gradient(#e5e5e5 1px, transparent 1px),
    linear-gradient(90deg,#e5e5e5 1px, transparent 1px);
    background-size: 40px 40px;
}

.hero{
    padding-top:80px;
}

h1{
    font-size:42px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:70px;
}

/* card style */

.card{
    width:180px;
    height:260px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    transition:0.4s;
    animation: float 6s ease-in-out infinite;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* card rotation */

.c1{ --r:-15deg; transform:rotate(-15deg);}
.c2{ --r:-8deg; transform:rotate(-8deg);}
.c3{ --r:0deg; transform:rotate(0deg);}
.c4{ --r:8deg; transform:rotate(8deg);}
.c5{ --r:15deg; transform:rotate(15deg);}

/* floating animation */

@keyframes float{
    0%{
        transform:translateY(0) rotate(var(--r));
    }

    50%{
        transform:translateY(-20px) rotate(var(--r));
    }

    100%{
        transform:translateY(0) rotate(var(--r));
    }
}

/* hover effect */

.card:hover{
    transform:scale(1.1) rotate(0deg);
    z-index:10;
}

</style>
</head>

<body>

<section class="hero">

<h1>Generate Stunning Wallpapers<br>Powered by AI</h1>

<div class="cards">

<div class="card c1">
<img src="https://picsum.photos/200/300?1">
</div>

<div class="card c2">
<img src="https://picsum.photos/200/300?2">
</div>

<div class="card c3">
<img src="https://picsum.photos/200/300?3">
</div>

<div class="card c4">
<img src="https://picsum.photos/200/300?4">
</div>

<div class="card c5">
<img src="https://picsum.photos/200/300?5">
</div>

</div>

</section>


</body>
</html>
