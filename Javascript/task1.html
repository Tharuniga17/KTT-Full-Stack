<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h2>Calculator</h2>
    <input type="text" placeholder="first number" id="num1"/><br><br>
    <input type="text" placeholder="second number" id="num2" /><br><br>
    <button onclick="press('+')">Add</button>
    <button onclick="press('-')">Sub</button>
    <button onclick="press('*')">Mul</button>
    <button onclick="press('/')">Div</button>
    <h3 id="result"></h3>
    <script>
        
        function press(res){
            let a = Number(document.getElementById("num1").value)
            let b = Number(document.getElementById("num2").value)
            let result;
            if(res === "+"){
                result = a + b
            }
            else if(res === "-"){
                result = a - b
            }
            else if (res === "*"){
                result = a*b 
            }
            else{
                result = a/b
            }
            document.getElementById("result").innerText = "Result:" + result;
        }
    </script>
</body>
</html>
