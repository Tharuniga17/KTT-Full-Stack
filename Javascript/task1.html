<!DOCTYPE html>
<html>
<head>
  <style>
    #box {
      width: 100px;
      height: 100px;
      background: teal;
      position: absolute;
      top: 100px;
      left: 100px;
      cursor: grab;
    }
  </style>
</head>
<body>

<div id="box"></div>

<script>
let box = document.getElementById("box");

let shiftX, shiftY;

box.onmousedown = function (e) {
  shiftX = e.clientX - box.offsetLeft; //here only dragging will start
  shiftY = e.clientY - box.offsetTop;

  document.onmousemove = function (e) {  //here the mouse moves
    box.style.left = e.pageX - shiftX + "px";
    box.style.top = e.pageY - shiftY + "px";
  };

  document.onmouseup = function () {  //here the dragging stops
    document.onmousemove = null;
    document.onmouseup = null;
  };
};
</script>

</body>
</html>
