<form id="myForm">
  <input type="text" name="username" placeholder="Enter name">
  <input type="file" name="file">
  <button type="submit">Submit</button>
  <button onclick="startFetch()">Start</button>
  <button id="stopBtn" onclick = "stopFetch()">Cancel</button>
</form>

<script src="form.js">
let form = document.getElementById("myForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  let formData = new FormData(form);

  // View data
  for (let [key, value] of formData) {
    console.log(key, value);
  }

  // Send to server
  let res = await fetch("https://jsonplaceholder.typicode.com/posts", {
    method: "POST",
    body: formData
  });

  let result = await res.json();
  console.log("Server Response:", result);
});
</script>


<!DOCTYPE html>
<html>
<head>
  <title>Fetch with AbortController</title>
</head>
<body>

  <button id="startBtn">Start Fetch</button>
  <button id="stopBtn">Cancel Fetch</button>

  <script>
    let controller;

    // 🔥 START FETCH
    document.getElementById("startBtn").addEventListener("click", startFetch);

    async function startFetch() {
      controller = new AbortController();

      try {
        let response = await fetch(
          "https://jsonplaceholder.typicode.com/posts",
          { signal: controller.signal }
        );

        let data = await response.json();
        console.log("Data received:", data);

      } catch (err) {
        if (err.name === "AbortError") {
          console.log("Fetch cancelled ❌");
        } else {
          console.log("Error:", err);
        }
      }
    }

    // 🔥 STOP FETCH
    document.getElementById("stopBtn").addEventListener("click", () => {
      if (controller) {
        controller.abort();
        console.log("Stopped by user 🛑");
      } else {
        console.log("No active request");
      }
    });

  </script>

</body>
</html>
