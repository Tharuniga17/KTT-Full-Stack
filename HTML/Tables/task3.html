<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            table{    
                border-collapse: collapse;
                margin: auto;
                margin-top: 100px;
                width: 100%;
            }
            th,td{
                border: 1px solid black;
                padding: 10px;
            }
            th{
                background-color: blue;
            }
            @media (max-width:1000px) {
                th{
                    background-color: red;
                    font-size: x-large;
                }
            }
            .table-container{
                overflow-x: auto;
            }
        </style>
    </head>
    <body>
        <div class="table-container">
        <table>
            <tr>
                <th>Name</th>
                <th colspan="2">Jobs</th>
                <th rowspan="1">Working Experience</th>
            </tr>
            <tr>
                <td>John</td>
                <td>Software</td>
                <td>Data analyst</td>
                <td rowspan="2">5 years</td>
            </tr>
            <tr>
                <td>Ale</td>
                <td colspan="2">Senior web developer</td>
            </tr>
            <tr>
                <td>Jack</td>
                <td>Junior Tech writer</td>
                <td>Blogger</td>
                <td>6 Months</td>
            </tr>
        </table>
        </div>
    </body>
</html>
