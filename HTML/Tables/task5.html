<!DOCTYPE html>
<html>
    <head>
        <style>
            table,tr,th,td{
                border: 1px solid black;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>Name</th>
                <th colspan="2">Jobs</th>
                <th rowspan="1">Working Experience</th>
            </tr>
            <tr>
                <td>John</td>
                <td>Software</td>
                <td>Data analyst</td>
                <td rowspan="2">5 years</td>
            </tr>
            <tr>
                <td>Ale</td>
                <td colspan="2">Senior web developer</td>
            </tr>
            <tr>
                <td>Jack</td>
                <td>Junior Tech writer</td>
                <td>Blogger</td>
                <td>6 Months</td>
            </tr>
        </table>
    </body>
</html>
